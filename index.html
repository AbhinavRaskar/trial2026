<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First Web Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #0077cc;
            color: white;
            padding: 20px;
        }

        section {
            margin: 20px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 20px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }

        footer {
            margin-top: 20px;
            padding: 10px;
            background-color: #222;
            color: white;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome Abhinav 🚀</h1>
        <p>This is a simple HTML full example page</p>
    </header>

    <section>
        <h2>About Me</h2>
        <p>I am learning Web Development and aiming for 12+ LPA package 💻</p>
        <button onclick="showMessage()">Click Me</button>
    </section>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

    <script>
        function showMessage() {
            alert("Keep Learning and Building Projects 🔥");
        }
    </script>

</body>
</html>
